name: TagBot
on:
  issue_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      lookback:
        default: "3"
permissions:
  actions: read
  checks: read
  contents: write
  deployments: read
  issues: read
  discussions: read
  packages: read
  pages: read
  pull-requests: read
  repository-projects: read
  security-events: read
  statuses: read
jobs:
  TagBot:
    if: github.event_name == 'workflow_dispatch' || github.actor == 'JuliaTagBot'
    runs-on: ubuntu-latest
    steps:
      - uses: JuliaRegistries/TagBot@v1
        with:
          # Use a PAT (not GITHUB_TOKEN) so the tag push triggers downstream
          # workflows like Documentation and CI. Events created with
          # GITHUB_TOKEN are deliberately not propagated by GitHub Actions.
          token: ${{ secrets.TAGBOT_PAT }}
          ssh: ${{ secrets.DOCUMENTER_KEY }}
